<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <g filter="url(#glow)">
    <!-- Outer Gear Teeth -->
    <circle cx="50" cy="50" r="35" fill="none" stroke="#0055ff" stroke-width="12" stroke-dasharray="14 8" />
    
    <!-- Solid Ring -->
    <circle cx="50" cy="50" r="28" fill="none" stroke="#0055ff" stroke-width="6" />
    
    <!-- Red Lightning -->
    <polygon points="58,15 30,55 48,55 42,85 70,45 52,45" fill="#ff3333" />
  </g>
</svg>